---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  namespace: development
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: user-service
          image: .dkr.ecr.eu-north-1.amazonaws.com/dev-user-service:c99f4ef30132e81324c82480a8ed65b35e537a76
#          imagePullPolicy: Never - This is commented out to allow Kubernetes to pull the image from ECR. If you want to use a local image, uncomment this line and ensure the image is built locally.
          ports:
            - containerPort: 8082