---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  namespace: development
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 593793049094.dkr.ecr.eu-north-1.amazonaws.com/dev-user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082