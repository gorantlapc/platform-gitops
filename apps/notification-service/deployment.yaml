---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  namespace: development
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: notification-service
          image: .dkr.ecr.eu-north-1.amazonaws.com/dev-notification-service:c99f4ef30132e81324c82480a8ed65b35e537a76
#          imagePullPolicy: Never - This is commented out to allow Kubernetes to pull the image from ECR. If you want to use a local image, uncomment this line and ensure the image is built locally.
          ports:
            - containerPort: 8087
          env:
            - name: LOCALSTACK_ENDPOINT
              value: http://localstack:4566
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_SQS_QUEUE_NAME
              value: notification-queue
            - name: SES_FROM_ADDRESS
              value: gorantla.gpc@gmail.com