---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-deployment
  namespace: development
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: inventory-service
          image: .dkr.ecr..amazonaws.com/dev-inventory-service:7738e01d80d118243ad990a0399fd18f02b46d34
#          imagePullPolicy: Never - This is commented out to allow Kubernetes to pull the image from ECR. If you want to use a local image, uncomment this line and ensure the image is built locally.
          ports:
            - containerPort: 8088